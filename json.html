    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { text-align: center; padding: 20px; width: 100%; background: #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .box { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 10px; height: 100%;}
        
        textarea { width: 100%; height: 100%; background: #1e293b; color: #a5b4fc; border: 1px solid #334155; border-radius: 8px; padding: 15px; font-family: monospace; resize: none; outline: none; font-size: 1rem;}

<body>
    <header>
        <h1>KINDER<span>HUB</span></h1>
        <p>JSON Formatter & Validator</p>
        <a href="index.html">← Back to Tools Hub</a>
    </header>

    <div class="action-bar" style="margin-top: 20px;">
        <button onclick="formatJSON()">Format JSON ✨</button>
        <button id="copy-btn" onclick="copyJSON()" style="background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8;">Copy Output</button>
    </div>
    <div id="error-msg" class="error"></div>

    <div class="container">
        <div class="box">
            <h3 style="color: #cbd5e1;">Input (Messy JSON):</h3>
            <textarea id="input-json" placeholder='{"name":"kinder","skill":"coding","tools":true}'></textarea>
        </div>
        <div class="box">
            <h3 style="color: #cbd5e1;">Output (Formatted JSON):</h3>
            <textarea id="output-json" readonly placeholder="Result will appear here..."></textarea>
        </div>
    </div>

    <script>
        function formatJSON() {
            const input = document.getElementById('input-json').value;
            const output = document.getElementById('output-json');
            const errorMsg = document.getElementById('error-msg');
            
            if(input.trim() === "") {
                errorMsg.innerText = "Please enter some JSON code first.";
                return;
            }

            try {
                // Parse karta hai aur 4 spaces ke saath wapas string banata hai
                const parsed = JSON.parse(input);
                output.value = JSON.stringify(parsed, null, 4);
                errorMsg.innerText = ""; // clear error
            } catch (err) {
                output.value = "";
                errorMsg.innerText = "❌ Invalid JSON! Please check your code.";
            }
        }

        function copyJSON() {
            const output = document.getElementById('output-json');
            if(output.value !== "") {
                navigator.clipboard.writeText(output.value);
                
                // Smart copy button animation (Alert ki jagah)
                const btn = document.getElementById('copy-btn');
                btn.innerText = "Copied! ✔";
                btn.style.background = "#22c55e"; // Green color
                btn.style.color = "#fff";
                
                setTimeout(() => { 
                    btn.innerText = "Copy Output"; 
                    btn.style.background = "#1e293b"; // Wapas dark theme
                    btn.style.color = "#38bdf8"; 
                }, 2000);
            }
        }
    </script>
</body>
