    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .setting label { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; color: #cbd5e1; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        
        .color-group { display: flex; gap: 15px; margin-top: 20px; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 6px; cursor: pointer; background: none; }

        /* Preview */

        /* Checkered background to make blobs pop */
        .blob-container { width: 100%; height: 350px; display: flex; align-items: center; justify-content: center; background: repeating-conic-gradient(#1e293b 0% 25%, #0f172a 0% 50%) 50% / 20px 20px; border-radius: 12px; border: 1px solid #334155; overflow: hidden;}
        .blob-box { width: 250px; height: 250px; background: linear-gradient(135deg, #38bdf8, #6366f1); border-radius: 50%; transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .code-output p { font-family: monospace; color: #a5b4fc; font-size: 0.95rem; line-height: 1.5; word-break: break-all; }
        .copy-btn { margin-top: 15px; width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem;}

<body>
    <header>
        <h1>KINDER<span>HUB</span></h1>
        <p>Organic Blob Shape Generator</p>
        <a href="index.html">← Back to Tools Hub</a>
    </header>

    <div class="container">
        <!-- Sliders -->
        <div class="controls">
            <div class="controls-header">
                <h3 style="color: #38bdf8;"><i class="fas fa-shapes"></i> Shape Controls</h3>
                <!-- NEW PRO FEATURE: Randomize Button -->
                <button class="random-btn" onclick="randomizeBlob()"><i class="fas fa-dice"></i> Randomize</button>
            </div>
            
            <div class="setting">
                <label>Top Left <span id="val1">50%</span></label>
                <input type="range" id="slider1" min="10" max="100" value="50">
            </div>
            <div class="setting">
                <label>Top Right <span id="val2">50%</span></label>
                <input type="range" id="slider2" min="10" max="100" value="50">
            </div>
            <div class="setting">
                <label>Bottom Left <span id="val3">50%</span></label>
                <input type="range" id="slider3" min="10" max="100" value="50">
            </div>
            <div class="setting">
                <label>Bottom Right <span id="val4">50%</span></label>
                <input type="range" id="slider4" min="10" max="100" value="50">
            </div>
            
            <div class="color-group">
                <input type="color" id="color1" value="#38bdf8">
                <input type="color" id="color2" value="#6366f1">
            </div>
        </div>

        <!-- Preview -->
        <div class="preview-section">
            <div class="blob-container">
                <div class="blob-box" id="blob"></div>
            </div>
            
            <div class="code-output">
                <p id="css-code">border-radius: 50% 50% 50% 50%;<br>background: linear-gradient(135deg, #38bdf8, #6366f1);</p>
                <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copy CSS Code</button>
            </div>
        </div>
    </div>

    <script>
        const s1 = document.getElementById('slider1');
        const s2 = document.getElementById('slider2');
        const s3 = document.getElementById('slider3');
        const s4 = document.getElementById('slider4');
        const c1 = document.getElementById('color1');
        const c2 = document.getElementById('color2');
        const blob = document.getElementById('blob');
        const code = document.getElementById('css-code');

        function updateBlob() {
            let radius = `${s1.value}% ${100 - s1.value}% ${s3.value}% ${100 - s3.value}% / ${s4.value}% ${s2.value}% ${100 - s2.value}% ${100 - s4.value}%`;
            let background = `linear-gradient(135deg, ${c1.value}, ${c2.value})`;

            blob.style.borderRadius = radius;
            blob.style.background = background;

            // Update Labels
            document.getElementById('val1').innerText = s1.value + '%';
            document.getElementById('val2').innerText = s2.value + '%';
            document.getElementById('val3').innerText = s3.value + '%';
            document.getElementById('val4').innerText = s4.value + '%';

            // Update Code
            code.innerHTML = `border-radius: ${radius};<br>background: ${background};`;
        }

        // NEW PRO FEATURE: Randomizer Logic
        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function getRandomHex() {
            return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
        }

        function randomizeBlob() {
            s1.value = getRandomInt(20, 80);
            s2.value = getRandomInt(20, 80);
            s3.value = getRandomInt(20, 80);
            s4.value = getRandomInt(20, 80);
            
            // Generate random matching/cool colors occasionally
            c1.value = getRandomHex();
            c2.value = getRandomHex();

            updateBlob();
        }

        [s1, s2, s3, s4, c1, c2].forEach(el => el.addEventListener('input', updateBlob));
        updateBlob(); // Initialize

        function copyCode() {
            // Text to copy (removing <br> tags)
            let rawCode = code.innerHTML.replace(/<br>/g, '\n');
            navigator.clipboard.writeText(rawCode);
            
            const btn = document.getElementById("copy-btn");
            btn.innerText = "Copied! ✔";
            btn.style.background = "#22c55e";
            setTimeout(() => { btn.innerText = "Copy CSS Code"; btn.style.background = "#38bdf8"; }, 2000);
        }
    </script>
