    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* Dynamic Theme Switcher */
        body { transition: background 0.5s ease; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        body.glass-theme { background-color: #0f172a; color: #f8fafc; }
        body.neu-theme { background-color: #e0e5ec; color: #31344b; }

        header { text-align: center; padding: 30px 20px; width: 100%; transition: 0.3s; }
        .glass-theme header { background: #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .neu-theme header { background: #e0e5ec; box-shadow: 6px 6px 12px #b8b9be, -6px -6px 12px #ffffff; }

        header h1 { font-size: 2.5rem; letter-spacing: 1px; }
        header h1 span { color: #38bdf8; }
        header a { color: #38bdf8; text-decoration: none; font-size: 0.9rem; margin-top: 15px; display: inline-block; font-weight: bold; }

        /* Category Switcher */
        .category-nav { display: flex; gap: 20px; margin: 30px 0; background: rgba(0,0,0,0.1); padding: 10px; border-radius: 50px; }
        .cat-btn { padding: 12px 30px; border: none; border-radius: 40px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; }
        .cat-btn.active { background: #38bdf8; color: white; box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3); }

        .container { display: flex; flex-wrap: wrap; gap: 40px; margin: 20px; max-width: 1100px; width: 100%; justify-content: center; }
        
        /* UI Panels */
        .panel { padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; transition: 0.3s; }
        .glass-theme .panel { background: #1e293b; border: 1px solid #334155; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        .neu-theme .panel { background: #e0e5ec; box-shadow: 9px 9px 16px #bebebe, -9px -9px 16px #ffffff; }

        .setting { margin-bottom: 20px; }
        .setting label { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #38bdf8; }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; }

        /* Preview Area */
        .preview-section { width: 100%; max-width: 550px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .canvas { width: 100%; height: 350px; border-radius: 20px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; transition: 0.5s; }
        
        /* Animation for Glass BG */
        .glass-bg { background: linear-gradient(45deg, #f06, #3cf, #f06); background-size: 400% 400%; animation: gradientAnim 10s ease infinite; }
        @keyframes gradientAnim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .preview-box { width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; transition: 0.2s; }

        .code-output { width: 100%; padding: 20px; border-radius: 15px; transition: 0.3s; }
        .glass-theme .code-output { background: #0f172a; border: 1px solid #334155; }
        .neu-theme .code-output { background: #e0e5ec; box-shadow: inset 6px 6px 12px #bebebe, inset -6px -6px 12px #ffffff; }
        
        pre { font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; word-break: break-all; }
        
        .copy-btn { margin-top: 15px; width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; background: #38bdf8; color: white; }
        .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }
    </style>
</head>
<body class="glass-theme">

    <header>
        <h1>KINDER<span>HUB</span></h1>
        <p>Premium UI Component Generator</p>
        <a href="index.html">← Back to Tools Hub</a>
    </header>

    <!-- Category Switcher -->
    <div class="category-nav">
        <button class="cat-btn active" onclick="switchTab('glass')">Glassmorphism</button>
        <button class="cat-btn" onclick="switchTab('neu')">Neumorphism</button>
    </div>

    <div class="container">
        <!-- Controls Panel -->
        <div class="panel">
            <h3 id="panel-title" style="margin-bottom: 20px;"><i class="fas fa-sliders-h"></i> Glass Settings</h3>
            
            <div id="glass-controls">
                <div class="setting">
                    <label>Blur Intensity <span id="blur-val">10px</span></label>
                    <input type="range" id="glass-blur" min="0" max="25" value="10" oninput="updateUI()">
                </div>
                <div class="setting">
                    <label>Transparency <span id="trans-val">0.2</span></label>
                    <input type="range" id="glass-trans" min="0" max="1" step="0.05" value="0.2" oninput="updateUI()">
                </div>
                <div class="setting">
                    <label>Tint Color</label>
                    <input type="color" id="glass-color" value="#ffffff" oninput="updateUI()">
                </div>
            </div>

            <div id="neu-controls" style="display: none;">
                <div class="setting">
                    <label>Distance <span id="dist-val">10px</span></label>
                    <input type="range" id="neu-dist" min="5" max="50" value="10" oninput="updateUI()">
                </div>
                <div class="setting">
                    <label>Blur (Softness) <span id="neu-blur-val">20px</span></label>
                    <input type="range" id="neu-blur" min="5" max="100" value="20" oninput="updateUI()">
                </div>
                <div class="setting">
                    <label>Base Color</label>
                    <input type="color" id="neu-color" value="#e0e5ec" oninput="updateUI()">
                </div>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section">
            <div class="canvas glass-bg" id="main-canvas">
                <div class="preview-box" id="preview-box">Kinder</div>
            </div>
            
            <div class="code-output">
                <pre id="css-code"></pre>
                <button class="copy-btn" id="copy-btn" onclick="copyCode()">Copy CSS Code</button>
            </div>
        </div>
    </div>

    <script>
        let mode = 'glass';

        function switchTab(tab) {
            mode = tab;
            const body = document.body;
            const glassCtrl = document.getElementById('glass-controls');
            const neuCtrl = document.getElementById('neu-controls');
            const canvas = document.getElementById('main-canvas');
            const title = document.getElementById('panel-title');

            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            if(tab === 'glass') {
                body.className = 'glass-theme';
                glassCtrl.style.display = 'block';
                neuCtrl.style.display = 'none';
                canvas.classList.add('glass-bg');
                title.innerHTML = '<i class="fas fa-sliders-h"></i> Glass Settings';
            } else {
                body.className = 'neu-theme';
                glassCtrl.style.display = 'none';
                neuCtrl.style.display = 'block';
                canvas.classList.remove('glass-bg');
                title.innerHTML = '<i class="fas fa-magic"></i> Neumorphism Engine';
            }
            updateUI();
        }

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function ColorLuminance(hex, lum) {
            hex = String(hex).replace(/[^0-9a-f]/gi, '');
            if (hex.length < 6) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            lum = lum || 0;
            let rgb = "#", c, i;
            for (i = 0; i < 3; i++) {
                c = parseInt(hex.substr(i*2,2), 16);
                c = Math.round(Math.min(Math.max(0, c + (c * lum)), 255)).toString(16);
                rgb += ("00"+c).substr(c.length);
            }
            return rgb;
        }

        function updateUI() {
            const box = document.getElementById('preview-box');
            const code = document.getElementById('css-code');
            const canvas = document.getElementById('main-canvas');

            if(mode === 'glass') {
                const blur = document.getElementById('glass-blur').value;
                const trans = document.getElementById('glass-trans').value;
                const rgb = hexToRgb(document.getElementById('glass-color').value);
                
                document.getElementById('blur-val').innerText = blur + 'px';
                document.getElementById('trans-val').innerText = trans;

                const style = `background: rgba(${rgb}, ${trans});\nbackdrop-filter: blur(${blur}px);\n-webkit-backdrop-filter: blur(${blur}px);\nborder-radius: 20px;\nborder: 1px solid rgba(255, 255, 255, 0.18);\nbox-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);`;
                
                box.style.cssText = style;
                box.style.color = "#ffffff";
                code.innerText = style;
            } else {
                const d = document.getElementById('neu-dist').value;
                const b = document.getElementById('neu-blur').value;
                const color = document.getElementById('neu-color').value;
                
                document.getElementById('dist-val').innerText = d + 'px';
                document.getElementById('neu-blur-val').innerText = b + 'px';

                const light = ColorLuminance(color, 0.15);
                const dark = ColorLuminance(color, -0.15);

                canvas.style.backgroundColor = color;
                box.style.backgroundColor = color;
                box.style.borderRadius = "40px";
                box.style.color = "#31344b";
                
                const shadow = `${d}px ${d}px ${b}px ${dark}, -${d}px -${d}px ${b}px ${light}`;
                box.style.boxShadow = shadow;
                
                code.innerText = `background: ${color};\nborder-radius: 40px;\nbox-shadow: ${shadow};`;
            }
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('css-code').innerText);
            const btn = document.getElementById("copy-btn");
            btn.innerText = "Copied! ✔";
            setTimeout(() => btn.innerText = "Copy CSS Code", 2000);
        }

        updateUI();
    </script>
</body>
</html>
