<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- =======================================================

         Project: Code Beautifier Pro (Kinder Hub)
    ============================================================ -->
    <title>Pro Code Snippet Beautifier & Image Generator | Kinder Hub</title>
    <meta name="title" content="Pro Code Snippet Beautifier & Image Generator | Kinder Hub">
    <meta name="description" content="Turn your boring code into beautiful, syntax-highlighted Mac-style window images. Download high-quality PNGs for Instagram and Twitter instantly. Free tool by 13kinder_.">
    <meta name="keywords" content="Code beautifier, code to image, code screenshot generator, syntax highlighting, share code snippet, mac style code window, Kinder Hub, 13kinder_">
    <meta name="author" content="13kinder_">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kinderhub.netlify.app/beautifier.html">
    <meta property="og:title" content="Code Snippet Beautifier | Kinder Hub">
    <meta property="og:description" content="Generate beautiful Mac-style images of your code snippets instantly.">
    <meta property="og:image" content="https://kinderhub.netlify.app/logo.png">

    <!-- Twitter Tags -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Code Beautifier Pro | Kinder Hub">
    <meta property="twitter:description" content="Convert your code into stunning images for social media sharing.">

    <!-- Highlight.js Themes (Atom One Dark for that Pro hacker look) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { text-align: center; padding: 30px 20px; width: 100%; background: #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { color: #f8fafc; font-size: 2.5rem; letter-spacing: 1px; }
        header h1 span { color: #38bdf8; }
        header p { color: #94a3b8; margin-top: 5px; }
        header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-top: 15px; display: inline-block; transition: 0.3s; }
        header a:hover { color: #38bdf8; }

        .container { display: flex; flex-wrap: wrap; gap: 40px; margin: 40px 20px; max-width: 1100px; width: 100%; justify-content: center; align-items: flex-start;}
        
        /* Controls Section */
        .controls-section { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px; background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 15px rgba(0,0,0,0.2);}
        
        .setting-group { display: flex; flex-direction: column; gap: 8px; }
        .setting-group label { color: #cbd5e1; font-weight: bold; font-size: 0.95rem; }
        
        select { background: #0f172a; color: #38bdf8; border: 1px solid #334155; padding: 10px; border-radius: 6px; outline: none; cursor: pointer; font-size: 0.95rem; font-weight: bold;}
        
        textarea { width: 100%; height: 200px; background: #0f172a; color: #f8fafc; border: 1px solid #334155; border-radius: 8px; padding: 15px; font-family: monospace; resize: none; outline: none; font-size: 0.95rem; }
        textarea:focus { border-color: #38bdf8; }

        .theme-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .theme-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .theme-btn:hover, .theme-btn.active { transform: scale(1.1); border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3);}
        
        .btn-large { width: 100%; padding: 15px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-large:hover { background: #0ea5e9; transform: translateY(-2px);}

        /* Preview Section */
        .preview-wrapper { width: 100%; max-width: 600px; display: flex; justify-content: center; }
        
        /* The exact area that will be captured as an image */
        .capture-area { padding: 40px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; width: 100%; transition: background 0.5s ease; box-shadow: 0 20px 40px rgba(0,0,0,0.3);}
        
        /* Mac Window Style */
        .mac-window { background: #282c34; width: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1);}
        .mac-header { background: #21252b; padding: 15px 20px; display: flex; gap: 8px; align-items: center; justify-content: space-between;}
        .mac-dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .mac-title { color: #6b7280; font-size: 0.85rem; font-family: monospace; font-weight: bold; }
        
        .mac-body { padding: 25px; overflow-x: auto; background: #282c34; }
        /* Override Highlight.js background to blend with mac window */
        .mac-body pre code.hljs { background: transparent !important; padding: 0 !important; font-size: 1.05rem; line-height: 1.6; font-family: 'Courier New', Courier, monospace; }
        
    </style>
</head>
<body>
    <header>
        <h1>KINDER<span>HUB</span></h1>
        <p>Pro Code Beautifier</p>
        <a href="index.html">← Back to Tools Hub</a>
    </header>

    <div class="container">
        <!-- Input & Controls -->
        <div class="controls-section">
            <div class="setting-group">
                <label>Programming Language</label>
                <select id="lang-select">
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="php">PHP</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Paste Your Code</label>
                <textarea id="code-input" placeholder="<h1>Hello World</h1>"></textarea>
            </div>

            <div class="setting-group">
                <label>Background Theme</label>
                <div class="theme-buttons">
                    <div class="theme-btn active" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" data-bg="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></div>
                    <div class="theme-btn" style="background: linear-gradient(135deg, #fc466b 0%, #3f5efb 100%);" data-bg="linear-gradient(135deg, #fc466b 0%, #3f5efb 100%)"></div>
                    <div class="theme-btn" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);" data-bg="linear-gradient(135deg, #11998e 0%, #38ef7d 100%)"></div>
                    <div class="theme-btn" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%);" data-bg="linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%)"></div>
                    <div class="theme-btn" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);" data-bg="linear-gradient(135deg, #f6d365 0%, #fda085 100%)"></div>
                    <div class="theme-btn" style="background: #1e293b;" data-bg="#1e293b"></div>
                </div>
            </div>

            <button class="btn-large" id="download-btn">
                <i class="fas fa-download"></i> Download High-Res PNG
            </button>
        </div>

        <!-- Live Preview Capture Area -->
        <div class="preview-wrapper">
            <div class="capture-area" id="capture-area">
                <div class="mac-window">
                    <div class="mac-header">
                        <div class="mac-dots">
                            <div class="dot red"></div>
                            <div class="dot yellow"></div>
                            <div class="dot green"></div>
                        </div>
                        <div class="mac-title">snippet.<span id="ext">html</span></div>
                        <div style="width: 44px;"></div> <!-- Spacer for balance -->
                    </div>
                    <div class="mac-body">
                        <!-- Code gets injected here -->
                        <pre><code id="code-output" class="language-html">&lt;h1&gt;Hello World&lt;/h1&gt;</code></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts needed for Pro Features -->
    <!-- 1. Highlight.js for Syntax Highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <!-- 2. html2canvas for Image Downloading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const input = document.getElementById('code-input');
        const output = document.getElementById('code-output');
        const langSelect = document.getElementById('lang-select');
        const extSpan = document.getElementById('ext');
        const captureArea = document.getElementById('capture-area');
        const themeBtns = document.querySelectorAll('.theme-btn');
        const downloadBtn = document.getElementById('download-btn');

        // Function to update code and apply syntax highlighting
        function updatePreview() {
            let rawCode = input.value;
            if(rawCode === '') { rawCode = '<h1>Hello World</h1>'; }
            
            // Set text (this safely escapes HTML automatically when using textContent)
            output.textContent = rawCode;
            
            // Reset and apply language class
            const lang = langSelect.value;
            output.className = `language-${lang}`;
            
            // Apply Highlighting
            hljs.highlightElement(output);
            
            // Update Fake File Extension in Mac Header
            const extMap = { 'html': 'html', 'css': 'css', 'javascript': 'js', 'python': 'py', 'php': 'php' };
            extSpan.innerText = extMap[lang];
        }

        // Listeners for Code and Language changes
        input.addEventListener('input', updatePreview);
        langSelect.addEventListener('change', updatePreview);

        // Background Theme Changer Logic
        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active class from all
                themeBtns.forEach(b => b.classList.remove('active'));
                // Add to clicked
                btn.classList.add('active');
                // Apply background to capture area
                captureArea.style.background = btn.getAttribute('data-bg');
            });
        });

        // Download Image Logic using html2canvas
        downloadBtn.addEventListener('click', () => {
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
            
            // Use html2canvas to take screenshot of the specific div
            html2canvas(captureArea, {
                scale: 3, // High resolution (retina display quality)
                backgroundColor: null // Transparent behind the rounded corners
            }).then(canvas => {
                // Create a temporary link to trigger download
                const link = document.createElement('a');
                link.download = 'kinderhub-snippet.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Reset Button
                downloadBtn.innerHTML = '<i class="fas fa-check"></i> Downloaded!';
                downloadBtn.style.background = '#22c55e'; // Green success
                setTimeout(() => {
                    downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download High-Res PNG';
                    downloadBtn.style.background = '#38bdf8';
                }, 2000);
            });
        });

        // Initialize highlighting on page load
        hljs.highlightElement(output);
    </script>
</body>
</html>
