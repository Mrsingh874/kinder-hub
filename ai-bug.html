    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #080c14;
            color: #f8fafc;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #111827;
            border-bottom: 2px solid #38bdf8;
        }

        header h1 {
            color: #f8fafc;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header h1 span {
            color: #38bdf8;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* TERMINAL INTERFACE */
        .ai-terminal {
            background: #000;
            border: 1px solid #334155;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
        }

        .terminal-header {
            background: #1e293b;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 280px;
            background: transparent;
            border: none;
            color: #38bdf8;
            padding: 25px;
            font-family: 'Consolas', monospace;
            font-size: 1.1rem;
            outline: none;
            resize: none;
        }

        /* BUTTONS GROUP */
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #334155;
        }

        .btn {
            padding: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-free {
            background: #1f2937;
            color: #94a3b8;
        }

        .btn-pro {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* PAID FEATURE OVERLAY*/
        .pro-locked-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
        }

        .payment-card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #f59e0b;
            max-width: 380px;
            width: 95%;
            margin: auto;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
        }

        .upi-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            text-decoration: none;
            margin-bottom: 10px;
            cursor: pointer;
        }

        #wa-section {
            display: none;
            animation: slideUp 0.5s ease-in-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .report-grid {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: #111827;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #334155;
        }

        .fixed-code {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            color: #22c55e;
            border: 1px solid #1e293b;
            overflow-x: auto;
            white-space: pre-wrap;
            /* Code format sahi dikhane ke liye */
        }

        .pro-unlocked-badge {
            background: #22c55e;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <h1>KINDER<span>HUB</span></h1>
        <p>AI Neural Auditor & Bug Fixer</p>
    </header>

    <div class="container">
        <div class="ai-terminal">
            <div class="terminal-header">
                <div style="display: flex; gap: 8px;">
                    <div style="width:12px;height:12px;border-radius:50%;background:#ff5f56"></div>
                    <div style="width:12px;height:12px;border-radius:50%;background:#ffbd2e"></div>
                    <div style="width:12px;height:12px;border-radius:50%;background:#27c93f"></div>
                </div>
                <div style="display: flex; align-items: center;">
                    <span id="status" style="font-size:0.8rem; color:#64748b">ENGINE_READY_v4.0</span>
                    <span id="pro-badge" class="pro-unlocked-badge">PRO ACTIVE</span>
                </div>
            </div>

            <textarea id="raw-code" placeholder="Paste your error code here..."></textarea>

            <div class="btn-group">
                <button class="btn btn-free" onclick="runFreeScan()">
                    <i class="fas fa-search"></i> FREE BASIC SCAN
                </button>
                <button class="btn btn-pro" id="pro-btn-main" onclick="handleProClick()">
                    <i class="fas fa-crown"></i> PRO DEEP AUDIT
                </button>
            </div>

            <!-- Lock Overlay (Paywall) -->
            <div class="pro-locked-overlay" id="paywall">
                <div class="payment-card">
                    <i class="fas fa-crown" style="font-size: 2.2rem; color: #f59e0b; margin-bottom: 15px;"></i>
                    <h2 style="margin-bottom: 8px; font-size: 1.5rem;">Unlock Pro Auditor</h2>

                    <div
                        style="background: white; padding: 8px; border-radius: 12px; margin-bottom: 12px; display: inline-block;">
                        <img src="myqr.png" alt="Scan to Pay" style="width: 130px; height: 130px; display: block;">
                    </div>

                    <p style="color: #94a3b8; margin-bottom: 12px; font-size: 0.8rem;">Scan QR or pay <b>₹99</b> to
                        <b>raikinder01@axl</b>
                    </p>

                    <a href="upi://pay?pa=raikinder01@axl&pn=Kinder%20Hub%20Pro&am=99.00&cu=INR" class="upi-btn"
                        onclick="revealWhatsApp()" style="padding: 12px; font-size: 1rem;">
                        <i class="fas fa-mobile-alt"></i> PAY VIA UPI APP
                    </a>

                    <div id="wa-section" style="display:none; margin-top: 10px;">
                        <p style="color: #22c55e; font-size: 0.75rem; margin-bottom: 8px; font-weight: bold;">Verify
                            Payment👇</p>
                        <a href="https://wa.me/917850065491?text=Bhai%20payment%20ho%20gayi%20hai.%20Ye%20raha%20screenshot.%20Mujhe%20Pro%20Key%20bhej%20do!"
                            target="_blank" class="btn"
                            style="width: 100%; border-radius: 8px; background: #25d366; color: white; margin-bottom: 8px; text-decoration: none; font-size: 0.85rem; padding: 12px;">
                            <i class="fab fa-whatsapp"></i> SEND SCREENSHOT
                        </a>
                    </div>

                    <button class="btn"
                        style="width: 100%; border-radius: 8px; background: #334155; color: white; padding: 12px; margin-top: 5px; font-size: 0.85rem;"
                        onclick="activateWithKey()">
                        <i class="fas fa-key"></i> ENTER KEY
                    </button>

                    <p style="margin-top: 15px; font-size: 0.75rem; cursor: pointer; color: #ef4444; font-weight: bold;"
                        onclick="hidePaywall()">Cancel</p>
                </div>
            </div>
        </div>

        <div class="report-grid" id="result-grid">
            <div class="card">
                <h4 style="color: #38bdf8;"><i class="fas fa-info-circle"></i> Intelligence Report</h4>
                <div id="free-report" style="color: #94a3b8; font-size: 0.9rem; line-height: 1.6; margin-top:10px;">
                </div>
            </div>
            <div class="card" style="grid-column: 1 / -1;">
                <h4 style="color: #22c55e;"><i class="fas fa-magic"></i> Corrected Code</h4>
                <div class="fixed-code" id="fixed-output" style="margin-top:10px;">Awaiting Code...</div>
            </div>
        </div>
    </div>

    <script>
        const paywall = document.getElementById('paywall');
        const grid = document.getElementById('result-grid');
        const status = document.getElementById('status');
        const proBadge = document.getElementById('pro-badge');
        const waSection = document.getElementById('wa-section');

        let isPro = false;
        const SECRET_KEY = "KINDER_PRO_2026"; // Ye aapki key hai

        function revealWhatsApp() {
            waSection.style.display = 'block';
        }

        function handleProClick() {
            if (isPro) {
                runProAudit();
            } else {
                paywall.style.display = 'flex';
            }
        }

        function hidePaywall() {
            paywall.style.display = 'none';
            waSection.style.display = 'none';
        }

        function activateWithKey() {
            const key = prompt("Enter your Pro Activation Key:");
            if (key === SECRET_KEY) {
                isPro = true;
                proBadge.style.display = 'inline-block';
                status.innerText = "PRO_ENGINE_ACTIVE";
                status.style.color = "#f59e0b";
                hidePaywall();
                alert("Success! Pro Features Unlocked.");
            } else {
                alert("Invalid Key!");
            }
        }

        function runFreeScan() {
            const code = document.getElementById('raw-code').value;
            if (!code.trim()) return alert("Code dalna zaroori hai!");

            status.innerText = "SCANNING...";
            grid.style.display = 'none';

            setTimeout(() => {
                grid.style.display = 'grid';
                document.getElementById('free-report').innerHTML = "FREE MODE: Basic Check OK. AI Fixing and Security check is locked. Upgrade to Pro to auto-fix code.";
                document.getElementById('fixed-output').innerText = "/* Upgrade to PRO to see the magic */\n" + code;
                status.innerText = "ENGINE_READY_v4.0";
            }, 1000);
        }

        // ASLI AI KA JAADU YAHAN HAI
        async function runProAudit() {
            const codeInput = document.getElementById('raw-code').value;
            const reportBox = document.getElementById('free-report');
            const outputBox = document.getElementById('fixed-output');

            if (!codeInput.trim()) return alert("Pehle error wala code daalo bhai!");

            status.innerText = "DEEP_PRO_SCANNING (AI THINKING)...";
            grid.style.display = 'grid';
            reportBox.innerHTML = `
                <div style="border: 1px solid #f59e0b; padding: 10px; border-radius: 8px; background: rgba(245, 158, 11, 0.1);">
                    <h5 style="color: #f59e0b; margin-bottom: 10px;">🌟 PRO AUDIT ACTIVE</h5>
                    <p>Connecting to AI Neural Network...</p>
                </div>`;
            outputBox.innerText = "AI is finding and fixing bugs... Please wait a few seconds.";
            

           // Yahan se API Key delete kar di gayi hai (Now 100% Secure)
            
            // Ab hum direct Netlify Function (Middleman) ko bulayenge
            const url = `/.netlify/functions/gemini`;
            
            try {
                const response = await fetch(url, {
                    method: "POST",
                    body: JSON.stringify({ code: codeInput }) // Sirf code bhej rahe hain
                });

                const data = await response.json();
                
                if(data.error) {
                    outputBox.innerText = "Error: " + data.error.message;
                    return;
                }

                // AI ka jawab screen par dikhana
                const aiReply = data.candidates[0].content.parts[0].text;
                
                // ... (Baaki niche ka code waisa hi rahega jisme reportBox aur outputBox update hota hai)


                reportBox.innerHTML = `
                    <div style="border: 1px solid #22c55e; padding: 10px; border-radius: 8px; background: rgba(34, 197, 94, 0.1);">
                        <h5 style="color: #22c55e; margin-bottom: 10px;">✅ SCAN COMPLETE</h5>
                        <p><b>🛡️ Security:</b> VULNERABILITY_CLEAN</p>
                        <p><b>🚀 Bugs:</b> Fixed by AI</p>
                        <p><b>🔍 SEO Master:</b> OPTIMIZED</p>
                    </div>`;

                // Code screen par print karna
                outputBox.innerText = aiReply;
                status.innerText = "PRO_ENGINE_ACTIVE";

            } catch (error) {
                outputBox.innerText = "System Error! AI se connection nahi ho paya.";
                console.error(error);
                status.innerText = "ERROR_IN_AI_CORE";
            }
        }
    </script>
</body>
