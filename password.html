    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { text-align: center; padding: 30px 20px; width: 100%; background: #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* Naya Kinder Hub Branding */

        header h1 span { color: #38bdf8; }
        header p { color: #94a3b8; margin-top: 5px; }
        header a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; margin-top: 15px; display: inline-block; transition: 0.3s; }
        header a:hover { color: #38bdf8; }

        .container { background: #1e293b; padding: 30px; border-radius: 12px; margin: 50px 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 15px rgba(0,0,0,0.2); }
        
        /* Result Box Style */
        .result-container { background: #0f172a; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border: 1px solid #334155; position: relative;}
        
        /* Password Text Field */
        .result-container input { width: 100%; background: transparent; border: none; font-size: 1.2rem; letter-spacing: 2px; color: #38bdf8; outline: none; font-weight: bold;}
        
        /* Buttons container inside Result box */
        .action-btns { display: flex; gap: 10px; }
        
        .icon-btn { background: none; border: none; color: #94a3b8; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { color: #38bdf8; }
        .copy-btn { background: #38bdf8; color: #0f172a; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .copy-btn:hover { background: #0ea5e9; }

        .setting { display: flex; justify-content: space-between; margin: 15px 0; font-size: 1.1rem; }
        .setting label { color: #cbd5e1; }
        
        .btn-large { width: 100%; padding: 15px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-large:hover { background: #0ea5e9; }
        
        input[type="range"] { width: 100%; margin-top: 10px; cursor: pointer; accent-color: #38bdf8;}
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #38bdf8; }

</head>
<body>

    <header>
        <h1>KINDER<span>HUB</span></h1>
        <p>Hyper-Secure Password Generator</p>
        <a href="index.html">← Back to Tools Hub</a>
    </header>

    <div class="container">
        <!-- Result Box jisme Hide/Show aur Copy dono hain -->
        <div class="result-container">
            <input type="text" id="result" value="Click Generate" readonly>
            
            <div class="action-btns">
                <button class="icon-btn" id="toggle-visibility" onclick="togglePassword()" title="Show/Hide Password">
                    <i class="fas fa-eye"></i>
                </button>
                <button class="copy-btn" id="clipboard" onclick="copyPassword()">Copy</button>
            </div>
        </div>

        <div class="setting">
            <label>Password Length (<span id="length-val">12</span>)</label>
        </div>
        <input type="range" id="length" min="6" max="30" value="12" oninput="document.getElementById('length-val').innerText = this.value">

        <div class="setting">
            <label>Include Uppercase</label>
            <input type="checkbox" id="uppercase" checked>
        </div>
        <div class="setting">
            <label>Include Lowercase</label>
            <input type="checkbox" id="lowercase" checked>
        </div>
        <div class="setting">
            <label>Include Numbers</label>
            <input type="checkbox" id="numbers" checked>
        </div>
        <div class="setting">
            <label>Include Symbols</label>
            <input type="checkbox" id="symbols" checked>
        </div>

        <button class="btn-large" id="generate">Generate Password</button>
    </div>

    <script>
        const resultEl = document.getElementById('result');
        const lengthEl = document.getElementById('length');
        const uppercaseEl = document.getElementById('uppercase');
        const lowercaseEl = document.getElementById('lowercase');
        const numbersEl = document.getElementById('numbers');
        const symbolsEl = document.getElementById('symbols');
        const generateEl = document.getElementById('generate');
        const toggleBtn = document.getElementById('toggle-visibility');

        const randomFunc = {
            lower: () => String.fromCharCode(Math.floor(Math.random() * 26) + 97),
            upper: () => String.fromCharCode(Math.floor(Math.random() * 26) + 65),
            number: () => String.fromCharCode(Math.floor(Math.random() * 10) + 48),
            symbol: () => {
                const symbols = '!@#$%^&*(){}[]=<>/,.';
                return symbols[Math.floor(Math.random() * symbols.length)];
            }
        };

        generateEl.addEventListener('click', () => {
            const length = +lengthEl.value;
            const hasLower = lowercaseEl.checked;
            const hasUpper = uppercaseEl.checked;
            const hasNumber = numbersEl.checked;
            const hasSymbol = symbolsEl.checked;

            resultEl.value = generatePassword(hasLower, hasUpper, hasNumber, hasSymbol, length);
            
            // Generate karne ke baad wapas Text (dikhne wala) mode mein kar do
            resultEl.type = "text";
            toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
        });

        function generatePassword(lower, upper, number, symbol, length) {
            let generatedPassword = '';
            const typesCount = lower + upper + number + symbol;
            const typesArr = [{lower}, {upper}, {number}, {symbol}].filter(item => Object.values(item)[0]);
            
            if(typesCount === 0) return 'Select Options!';

            for(let i = 0; i < length; i += typesCount) {
                typesArr.forEach(type => {
                    const funcName = Object.keys(type)[0];
                    generatedPassword += randomFunc[funcName]();
                });
            }
            return generatedPassword.slice(0, length);
        }

        function copyPassword() {
            if(resultEl.value === 'Click Generate' || resultEl.value === 'Select Options!') return;
            
            navigator.clipboard.writeText(resultEl.value);
            const btn = document.getElementById('clipboard');
            btn.innerText = 'Copied!';
            btn.style.background = '#22c55e'; // Green for success
            
            setTimeout(() => { 
                btn.innerText = 'Copy'; 
                btn.style.background = '#38bdf8'; // Back to blue
            }, 2000);
        }

        // Hide/Show Logic
        function togglePassword() {
            // Agar pehle se Select Options wala text hai toh kuch mat karo
            if(resultEl.value === 'Click Generate' || resultEl.value === 'Select Options!') return;

            if (resultEl.type === "text") {
                resultEl.type = "password"; // Hide kar do (Dots dikhenge)
                toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i>'; // Icon kaat do
            } else {
                resultEl.type = "text"; // Wapas dikhao
                toggleBtn.innerHTML = '<i class="fas fa-eye"></i>'; // Normal eye icon
            }
        }
    </script>
</body>
